<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#1d1d1d;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.calculator{
    width:360px;
    background:#2d2d2d;
    border-radius:20px;
    padding:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.5);
}

.display{

    background:#111;
    color:#00ff99;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}

.display h1{
    font-size:40px;
    text-align:right;
}

.display p{
    color:#aaa;
    text-align:right;
}

input{

    width:100%;
    padding:15px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
    background:#444;
    color:white;
    font-size:18px;

}

.grid{

display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;

}

button{

padding:18px;
font-size:18px;
border:none;
border-radius:12px;
cursor:pointer;
background:#4e4e4e;
color:white;
transition:.3s;

}

button:hover{

background:#666;

}

.orange{

background:#ff9500;

}

.orange:hover{

background:#ffa733;

}

</style>

</head>

<body>

<div class="calculator">

<div class="display">

<p>Result</p>

<h1>

{% if result is not none %}
{{ result }}
{% else %}
0
{% endif %}

</h1>

</div>

<form method="POST">

<input
type="number"
step="any"
name="num1"
placeholder="First Number"
required>

<input
type="number"
step="any"
name="num2"
placeholder="Second Number"
required>

<div class="grid">

<button class="orange" name="operation" value="add">+</button>

<button class="orange" name="operation" value="subtract">−</button>

<button class="orange" name="operation" value="multiply">×</button>

<button class="orange" name="operation" value="divide">÷</button>

</div>

</form>

</div>

</body>
</html>
