<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculator</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#1f1f1f;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.calculator{
width:360px;
background:#2c2c2c;
padding:25px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,.5);
}

.display{
background:#000;
height:90px;
border-radius:15px;
padding:15px;
margin-bottom:20px;
display:flex;
justify-content:flex-end;
align-items:flex-end;
overflow:hidden;
}

.display h1{
color:#00ff88;
font-size:42px;
font-weight:normal;
}

input{
width:100%;
padding:15px;
margin-bottom:15px;
font-size:18px;
background:#444;
border:none;
border-radius:10px;
color:white;
}

input::placeholder{
color:#bbb;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

button{
padding:18px;
font-size:24px;
border:none;
border-radius:12px;
cursor:pointer;
transition:.3s;
}

.operator{
background:#ff9500;
color:white;
}

.operator:hover{
background:#ffad33;
}

.clear{
background:#e53935;
color:white;
grid-column:span 2;
}

.clear:hover{
background:#ff6666;
}

</style>

</head>

<body>

<div class="calculator">

<div class="display">
<h1 id="result">
{% if result is not none %}
{{ result }}
{% endif %}
</h1>
</div>

<form method="POST" id="calcForm">

<input
type="number"
step="any"
name="num1"
id="num1"
value="{{ num1 }}"
placeholder="First Number"
required>

<input
type="number"
step="any"
name="num2"
id="num2"
value="{{ num2 }}"
placeholder="Second Number"
required>

<div class="grid">

<button class="operator" name="operation" value="add">+</button>

<button class="operator" name="operation" value="subtract">−</button>

<button class="operator" name="operation" value="multiply">×</button>

<button class="operator" name="operation" value="divide">÷</button>

<button
type="button"
class="clear"
onclick="clearCalculator()">
C
</button>

</div>

</form>

</div>

<script>

function clearCalculator(){

document.getElementById("num1").value="";
document.getElementById("num2").value="";
document.getElementById("result").innerHTML="";

}

</script>

</body>

</html>
